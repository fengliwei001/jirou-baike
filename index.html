<style>

    padding:40px 20px;

<script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>

<!-- ============ 数据 + 脚本 ============ -->
<script>
/* ====== Lenis 初始化 ====== */
const lenis = new Lenis({
  duration: 1.2,          // 滚动动画时长(秒),越大越"飘"
  easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // 指数缓出,easeOutExpo
  smoothWheel: true,      // 启用滚轮平滑
  wheelMultiplier: 1,     // 滚轮灵敏度
  touchMultiplier: 2,     // 触屏灵敏度
  lerp: 0.1,              // 线性插值系数(0-1,越小越"丝滑但有延迟")
});

/* RAF 循环 */
function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* 锚点跳转(给"开始训练"用) */
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    const href = a.getAttribute('href');
    // 只拦截纯锚点链接(#开头且不带路径)
    if(href === '#' || href === '#/' || href.startsWith('#/')) return;
    const target = document.querySelector(href);
    if(target){
      e.preventDefault();
      lenis.scrollTo(target, {offset: -80, duration: 1.5});
    }
  });
});

/* 监听滚动事件(可选:做视差或动画触发) */
lenis.on('scroll', (e) => {
  // 当前滚动进度(0-1)
  // 可用于动画触发,例如让 hero 文字随滚动淡出
  const scrollY = e.animatedScroll;
  document.documentElement.style.setProperty('--scroll-y', scrollY + 'px');
});

/* ====== 主页逻辑 ====== */
let currentFilter = 'all';
let currentSearch = '';
const grid = document.getElementById('grid');
const statCount = document.getElementById('stat-count');
const searchInput = document.getElementById('search-input');

function renderHome(){
  const filtered = EXERCISES.filter(ex => {
    const matchFilter = currentFilter === 'all' || ex.equipment === currentFilter;
    const matchSearch = !currentSearch ||
      ex.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
      ex.en.toLowerCase().includes(currentSearch.toLowerCase()) ||
      ex.primary.includes(currentSearch);
    return matchFilter && matchSearch;
  });

  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="ico">🔍</div><p>没有找到匹配的动作,试试别的关键词</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(ex => `
    <article class="card" data-slug="${ex.slug}">
      <div class="card-media">
        <span class="badge">${ex.badge}</span>
        <img src="${ex.gif}" alt="${ex.name}" loading="lazy" />
        <div class="play-ico">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="card-body">
        <h3 class="card-title">${ex.name}</h3>
        <p class="card-sub">${ex.en} · 重点:${ex.primary}</p>
        <div class="card-tags">
          <span class="tag">${ex.equipment}</span>
          <span class="tag diff-${ex.difficulty === '初级' ? 'beginner' : ex.difficulty === '中级' ? 'intermediate' : 'advanced'}">${ex.difficulty}</span>
        </div>
      </div>
    </article>
  `).join('');

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', e => {
      // 单击 = 快速预览模态框;带 Ctrl/Cmd/中键 = 直接跳详情页
      if(e.ctrlKey || e.metaKey || e.button === 1){
        navigate(`#/exercise/${card.dataset.slug}`);
        return;
      }
      const ex = EXERCISES.find(x => x.slug === card.dataset.slug);
      if(ex) openModal(ex);
    });
  });
}

  // Lenis 停止滚动(模态框打开时背景固定)
  lenis.stop();
  // 立即把滚动位置拉回顶部,防止背景被滚到中段
  lenis.scrollTo(0, {immediate: true, force: true});
}

function closeModal(){
  modal.classList.remove('open');
  document.body.style.overflow = '';
  modalGif.src = '';
  // Lenis 恢复滚动
  lenis.start();
}

/* ====== 二级页:动作详情页 ====== */

  const related = EXERCISES
    .filter(e => e.id !== ex.id && (e.equipment === ex.equipment || e.primary.includes(ex.primary.split('(')[0])))
    .slice(0,4);

  const view = document.getElementById('view-detail');
  view.innerHTML = `
    <div class="detail-hero">
      <div class="detail-hero-inner">
        <div>
          <div class="breadcrumbs">
            <a href="#/">首页</a>
            <span class="sep">›</span>
            <a href="#/">胸部</a>
            <span class="sep">›</span>
            <span>${ex.name}</span>
          </div>
          <h1>${ex.name}</h1>
          <p class="en-name">${ex.en} · ${ex.badge}</p>
          <p class="summary">${ex.summary}</p>
          <div class="badges">
            <span class="tag">器械:${ex.equipment}</span>
            <span class="tag diff-${ex.difficulty === '初级' ? 'beginner' : ex.difficulty === '中级' ? 'intermediate' : 'advanced'}">难度:${ex.difficulty}</span>
          </div>
          <div class="detail-meta">
            <div class="info-box"><div class="lbl">主要肌群</div><div class="val">${ex.primary}</div></div>
            <div class="info-box"><div class="lbl">协同肌群</div><div class="val">${ex.secondary}</div></div>
          </div>
        </div>
        <div>
          <div class="gif-wrap">
            <img src="${ex.gif}" alt="${ex.name}" />
          </div>
        </div>
      </div>
    </div>

    <div class="detail-content">
      <div>
        <div class="section-block">
          <h3><span class="num">${ex.steps.length}</span>动作步骤详解</h3>
          <ol class="steps">${ex.steps.map(s => `<li>${s}</li>`).join('')}</ol>
        </div>
        <div class="section-block">
          <h3><span class="num">!</span>教练提示</h3>
          <div class="tip">${ex.tips}</div>
        </div>
        <div class="section-block">
          <h3><span class="num">▶</span>视频教程</h3>
          <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/${ex.youtube}?vq=hd1440&rel=0&modestbranding=1&autoplay=1&mute=1&loop=1&playlist=${ex.youtube}&playsinline=1" title="${ex.name} 教程" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
          </div>
        </div>
      </div>

      <aside>
        <div class="section-block">
          <h3>相关动作</h3>
          <div class="related-grid">
            ${related.map(r => `
              <a class="related-card" href="#/exercise/${r.slug}">
                <img src="${r.gif}" alt="${r.name}" loading="lazy" />
                <div class="info">
                  <div class="name">${r.name}</div>
                  <div class="sub">${r.equipment} · ${r.difficulty}</div>
                </div>
              </a>
            `).join('')}
          </div>
        </div>
        <div class="section-block">
          <h3>训练建议</h3>
          <div class="tip" style="margin-bottom:12px">
            <b>组数:</b> 初学者 3 组 × 8-12 次,进阶者 4 组 × 6-12 次
          </div>
          <div class="tip" style="margin-bottom:12px">
            <b>重量:</b> 选择能完成目标次数、最后 2 次力竭的重量
          </div>

/* ====== 三级页:器械分类页 ====== */
function renderCategoryPage(equipment){
  const list = EXERCISES.filter(e => e.equipment === equipment);
  const view = document.getElementById('view-category');

  if(list.length === 0){
    view.innerHTML = `
      <div class="cat-hero">
        <h1>${equipment}</h1>
        <p>该部位的动作库正在建设中,敬请期待</p>
      </div>
      <div class="container">
        <p style="text-align:center;color:var(--text-dim)">先来练练胸肌吧! <a href="#/" style="color:var(--accent)">返回胸部训练库 →</a></p>
      </div>
    `;
    return;
  }

  const diffCount = list.reduce((acc, e) => {
    acc[e.difficulty] = (acc[e.difficulty]||0)+1;
    return acc;
  }, {});

  view.innerHTML = `
    <div class="cat-hero">
      <div class="cat-icon">${EQUIPMENT_ICON[equipment] || ''}</div>
      <h1>${equipment} 训练</h1>
      <p>所有使用 <b>${equipment}</b> 的胸肌训练动作,共 ${list.length} 个。</p>
      <div class="count">${(diffCount['初级']||0)} 个初级 · ${(diffCount['中级']||0)} 个中级 · ${(diffCount['高级']||0)} 个高级</div>
    </div>
    <div class="container">
      <div class="grid">
        ${list.map(ex => `
          <article class="card" data-slug="${ex.slug}">
            <div class="card-media">
              <span class="badge">${ex.badge}</span>
              <img src="${ex.gif}" alt="${ex.name}" loading="lazy" />
              <div class="play-ico">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
            <div class="card-body">
              <h3 class="card-title">${ex.name}</h3>
              <p class="card-sub">${ex.en} · 重点:${ex.primary}</p>
              <div class="card-tags">
                <span class="tag diff-${ex.difficulty === '初级' ? 'beginner' : ex.difficulty === '中级' ? 'intermediate' : 'advanced'}">${ex.difficulty}</span>
              </div>
            </div>
          </article>
        `).join('')}
      </div>
    </div>
  `;

  view.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', e => {
      if(e.ctrlKey || e.metaKey || e.button === 1){
        navigate(`#/exercise/${card.dataset.slug}`);
        return;
      }
      const ex = EXERCISES.find(x => x.slug === card.dataset.slug);
      if(ex) openModal(ex);
    });
  });
}

function renderNotFound(){
  document.getElementById('view-detail').innerHTML = `
    <div class="container" style="text-align:center;padding:100px 20px">
      <div style="font-size:64px;margin-bottom:16px">😕</div>
      <h2>未找到该动作</h2>
      <p style="color:var(--text-dim);margin-top:8px">
        <a href="#/" style="color:var(--accent)">返回首页</a>
      </p>
    </div>
  `;
}

/* ====== 路由 ====== */
function showView(name){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  // 用 Lenis 立即滚到顶部(切换视图的瞬间)
  lenis.scrollTo(0, {immediate: true, force: true});
}

function navigate(hash){
  window.location.hash = hash;
}

function handleRoute(){
  const hash = window.location.hash || '#/';
  closeModal();

  // 隐藏所有视图
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  if(hash === '#/' || hash === ''){
    showView('home');
    updateNavLink('chest');
  }
  else if(hash.startsWith('#/exercise/')){
    const slug = hash.replace('#/exercise/','');
    showView('detail');
    renderDetailPage(slug);
    updateNavLink(null);
  }
  else if(hash.startsWith('#/category/')){
    const cat = decodeURIComponent(hash.replace('#/category/',''));
    showView('category');
    renderCategoryPage(cat);
    updateNavLink(null);
  }
  else {
    showView('home');
  }
}

function updateNavLink(cat){
  document.querySelectorAll('.nav-link').forEach(a => {
    a.classList.toggle('active', a.dataset.cat === cat);
  });
}

/* ====== 事件绑定 ====== */
document.querySelectorAll('[data-filter]').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderHome();
  });
});

searchInput.addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  renderHome();
});

modalClose.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if(e.target === modal) closeModal(); });

/* ====== 打赏弹层 ====== */
const supportFab = document.getElementById('support-fab');
const supportModal = document.getElementById('support-modal');
const supportClose = document.getElementById('support-close');

function openSupport(){
  supportModal.classList.add('open');
  lenis.stop();
  lenis.scrollTo(0, {immediate: true, force: true});
}
function closeSupport(){
  supportModal.classList.remove('open');
  lenis.start();
}
supportFab.addEventListener('click', openSupport);
supportClose.addEventListener('click', closeSupport);
supportModal.addEventListener('click', e => { if(e.target === supportModal) closeSupport(); });
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    closeModal();
    closeSupport();
  }
});

document.getElementById('brand').addEventListener('click', e => {
  e.preventDefault();
  navigate('#/');
});

// 数字动画
function animateCount(target){
  let n = 0;
  const step = Math.max(1, Math.floor(target / 30));
  const tick = () => {
    n = Math.min(target, n + step);
    statCount.textContent = n;
    if(n < target) requestAnimationFrame(tick);
  };
  tick();
}

/* ====== 启动 ====== */
renderHome();
animateCount(EXERCISES.length);
window.addEventListener('hashchange', handleRoute);
handleRoute();
</script>
</body>
